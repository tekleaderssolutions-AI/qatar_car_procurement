services:
  - type: web
    name: qatar-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: qatar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: qatar-cache
          property: connectionString

  - type: web
    name: qatar-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist

  - type: redis
    name: qatar-cache
    plan: free
    ipAllowList: []

databases:
  - name: qatar-db
    plan: free
