services:
  - type: web
    name: qatar-api
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.main:app -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT --workers=2
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: qatar-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: qatar-cache
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  - type: static_site
    name: qatar-frontend
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        value: https://qatar-api.onrender.com

  - type: redis
    name: qatar-cache
    plan: free

databases:
  - name: qatar-db
    plan: free
